[env:esp32div_v1]
platform = espressif32@6.7.0
board = esp32dev
framework = arduino

; Board hardware
board_build.flash_size = 16MB
board_build.partitions = huge_app.csv
board_build.f_cpu = 240000000L
board_build.flash_mode = dio
board_upload.flash_freq = 80m
upload_speed = 921600
upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001
monitor_speed = 115200

; Linker workaround: arduino-esp32 2.0.x duplicate symbol in libnet80211.a
build_flags =
    -Wl,-zmuldefs
    ; TFT_eSPI config (replaces User_Setup.h — required because PlatformIO cannot
    ; override the library's own User_Setup.h via include path ordering)
    -DUSER_SETUP_LOADED
    -DILI9341_DRIVER
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=0
    -DTFT_BL=4
    -DTOUCH_CS=33
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_FONT6
    -DLOAD_FONT7
    -DLOAD_FONT8
    -DLOAD_GFXFF
    -DSMOOTH_FONT
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000

lib_deps =
    bodmer/TFT_eSPI @ 2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git#v1.4
    nrf24/RF24 @ 1.6.1
    LSatan/SmartRC-CC1101-Driver-Lib @ 3.0.2
    sui77/rc-switch @ 2.6.4
    xreef/PCF8574 library @ 2.3.7
    kosme/arduinoFFT @ 1.6.2
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git

[env:native]
platform = native
test_framework = unity
build_flags = -std=c++17 -I include -I lib/logic -I lib/mocks
build_src_filter = -<src/hal/>
